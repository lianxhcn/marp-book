project:
  type: book
  output-dir: docs

book:
  title: "Marp 幻灯片入门"
  subtitle: "用 VS Code 轻松制作幻灯片"
  author: "连玉君"
  date: today
  date-format: iso
  repo-actions: [edit, issue]

  sidebar:
    title: "Marp Book"
    logo: images/book-logo.png
    logo-href: https://lianxhcn.github.io/marp-book/
    style: floating
    search: true
    background: light
    tools:
      - icon: github
        href: https://github.com/lianxhcn/marp-book
      - icon: home
        href: https://www.lianxh.cn

  favicon: images/book-logo.png
  site-url: https://lianxhcn.github.io/marp-book/
  editor: source

  # PDF 下载链接（显示在网站右上角工具栏）
  downloads: [pdf]

#----------------------- Chapters ---------------
  chapters:

    - index.qmd

    - part: "📚 正文"
      chapters:
        - chapters/ch01.qmd
        - chapters/ch02.qmd
        - chapters/ch03.qmd
        - chapters/ch04.qmd
        - chapters/ch05.qmd
        - chapters/ch06.qmd

    - part: "📖 附录：各类提示词"
      chapters:
        - appendix/appA.qmd
        - appendix/appB.qmd
        - appendix/appC.qmd
        - appendix/appD.qmd
        - appendix/appE.qmd
        - appendix/appF.qmd
        - appendix/appG.qmd
        - appendix/appI.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    linestretch: 1.6
    fontsize: 11.5pt
    number-sections: true
    link-external-newwindow: true
    highlight: true
    highlight-style: atom-one
    code-fold: false
    code-line-numbers: false
    code-overflow: wrap
    css: styles.css
    callout-appearance: default
    md-extensions:
      - callout
  pdf:
    documentclass: book
    papersize: a4
    fontsize: 11pt
    linestretch: 1.2
    code-overflow: wrap
    code-line-numbers: false
    output-file: "marp-book"
    include-in-header:
      text: |
        \usepackage{ctex}
        % 用 ulem 替代 soul，支持中文删除线（~~文字~~）
        \usepackage[normalem]{ulem}
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{
          breaksymbolleft={},
          breaksymbolright={},
          breaklines=true,
          breakanywhere=true,
          fontsize=\small,
          commandchars=\\\{\}
        }
        % 页脚显示网站地址
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyfoot[C]{\small 在线版：\url{https://lianxhcn.github.io/marp-book/}}
        \fancyfoot[R]{\thepage}
        \renewcommand{\footrulewidth}{0.4pt}
    toc: true
    number-sections: true

